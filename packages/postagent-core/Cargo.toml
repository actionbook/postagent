[package]
name = "postagent-core"
version = "0.3.3"
edition = "2021"

[[bin]]
name = "postagent-core"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
regex = "1"
dirs = "6"
thiserror = "2"
tempfile = "3"
sha2 = "0.10"
base64 = "0.22"
rand = "0.8"
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
hex = "0.4"
webbrowser = "1"

[target.'cfg(unix)'.dependencies]
libc = "0.2"
fs2 = "0.4"

[dev-dependencies]
tempfile = "3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
