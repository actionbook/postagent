# Publish: build + npm release executor. Triggered by a vX.Y.Z tag, or
# dispatched by release.yml after it tags a version.
#
# Matrix-builds postagent-core for the four supported targets (darwin
# arm64/x64, linux x64/arm64-gnu), drops each binary into its platform
# package, builds the postagent JS bundle, and publishes all five packages
# to npm. Does not touch version numbers — that is release.yml's job.

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
            package: postagent-darwin-arm64
            binary: postagent-core
          - target: x86_64-apple-darwin
            runner: macos-latest
            package: postagent-darwin-x64
            binary: postagent-core
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            package: postagent-linux-x64-gnu
            binary: postagent-core
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            package: postagent-linux-arm64-gnu
            binary: postagent-core

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: packages/postagent-core
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}
          path: packages/postagent-core/target/${{ matrix.target }}/release/${{ matrix.binary }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Place binaries into platform packages
        run: |
          for pkg in postagent-darwin-arm64 postagent-darwin-x64 postagent-linux-x64-gnu postagent-linux-arm64-gnu; do
            cp artifacts/$pkg/* packages/$pkg/bin/
          done
          chmod +x packages/postagent-darwin-*/bin/postagent-core
          chmod +x packages/postagent-linux-*/bin/postagent-core

      - name: Install dependencies
        run: pnpm install

      - name: Build postagent
        run: pnpm --filter postagent build

      - name: Publish platform packages
        run: |
          for pkg in postagent-darwin-arm64 postagent-darwin-x64 postagent-linux-x64-gnu postagent-linux-arm64-gnu; do
            pnpm --filter $pkg publish --no-git-checks --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish postagent
        run: pnpm --filter postagent publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Extract changelog for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const md = fs.readFileSync('packages/postagent/CHANGELOG.md', 'utf8');
            const re = new RegExp('^## ' + '${VERSION}'.replace(/\./g, '\\\\.') + '\\\\s*\\\\n([\\\\s\\\\S]*?)(?=^## |\\\\Z)', 'm');
            const m = md.match(re);
            const body = (m && m[1].trim()) || 'See [CHANGELOG.md](./packages/postagent/CHANGELOG.md).';
            fs.writeFileSync('RELEASE_NOTES.md', body + '\n');
          "

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
